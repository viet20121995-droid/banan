# Banan production stack — Caddy (auto-HTTPS reverse proxy) + NestJS backend
# + Postgres + Redis. Run on the Oracle VM:
#
#   docker compose -f docker-compose.prod.yml --env-file infra/.env.prod up -d --build
#
# Customer/Merchant/Kitchen web are served by Cloudflare Pages (static), NOT
# this stack — Caddy only fronts the API.
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set BASE_DOMAIN in infra/.env.prod, e.g. banan.com
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      # Static Flutter web builds (uploaded by infra/deploy-web.sh).
      - ./web/customer:/srv/customer:ro
      - ./web/merchant:/srv/merchant:ro
      - ./web/kitchen:/srv/kitchen:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [banan]
    depends_on: [backend]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ./infra/.env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - uploads:/app/uploads
      # Place the FCM service-account JSON here on the server (gitignored):
      #   backend/secrets/firebase-service-account.json
      - ./backend/secrets:/app/secrets:ro
    networks: [banan]
    expose: ["3000"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: banan
      POSTGRES_USER: banan
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [banan]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banan"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    networks: [banan]

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  redisdata:
  uploads:

networks:
  banan:
