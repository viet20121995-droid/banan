name: banan_kitchen
description: Banan — central kitchen production dashboard (web + tablet).
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  intl: ^0.20.0
  banan_core:
    path: ../../packages/core
  banan_design_system:
    path: ../../packages/design_system
  banan_domain:
    path: ../../packages/domain
  banan_data:
    path: ../../packages/data
  banan_features_shared:
    path: ../../packages/features_shared
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
