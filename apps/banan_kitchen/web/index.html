  <!-- New-order chime (Web Audio). Unlocked on first user interaction.
       Called from Dart when an order is transferred into this kitchen, and
       on foreground FCM messages. -->
  <script>
    (function () {
      var ctx = null;
      function ensureCtx() {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!ctx && AC) ctx = new AC();
        if (ctx && ctx.state === 'suspended') ctx.resume();
        return ctx;
      }
      ['pointerdown', 'keydown', 'touchstart'].forEach(function (ev) {
        window.addEventListener(ev, ensureCtx, { passive: true });
      });
      window.__bananChime = function () {
        try {
          var c = ensureCtx(); if (!c) return;
          function tone(freq, start, dur) {
            var o = c.createOscillator(), g = c.createGain();
            o.type = 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(c.destination);
            var t = c.currentTime + start;
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.4, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
            o.start(t); o.stop(t + dur + 0.02);
          }
          // Three rising tones — a louder "kitchen ticket" alert.
          tone(784, 0.0, 0.18);
          tone(988, 0.2, 0.18);
          tone(1319, 0.4, 0.3);
        } catch (e) {}
      };
    })();
  </script>

          if (!('Notification' in window)) return '';
          var perm = Notification.permission;
          if (perm === 'default') perm = await Notification.requestPermission();

          var reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
          return (await firebase.messaging().getToken({
            vapidKey: VAPID_KEY, serviceWorkerRegistration: reg
          })) || '';
        } catch (e) { console.warn('[push] token error', e); return ''; }
      };
    })();
