      window.__bananCanInstall = false;
      window.__bananDeferredPrompt = null;
    });

      var p = window.__bananDeferredPrompt;
      if (!p) return;
      p.prompt();
      p.userChoice.finally(function () {
        window.__bananDeferredPrompt = null;
        window.__bananCanInstall = false;
      });
    };
    // Persist the customer's language choice across reloads.
    window.__bananGetLocale = function () {
      try { return window.localStorage.getItem('banan.locale') || ''; }
      catch (e) { return ''; }
    };

      try { window.localStorage.setItem('banan.locale', code); }
      catch (e) {}

    window.__bananStorageGet = function (key) {
      try { return window.localStorage.getItem(key) || ''; }
      catch (e) { return ''; }
    };
    window.__bananStorageSet = function (key, value) {
      try { window.localStorage.setItem(key, value); }
      catch (e) {}
    };
  </script>
