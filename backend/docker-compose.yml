services:
  postgres:
    image: postgres:16-alpine
    container_name: banan-postgres
    environment:
      POSTGRES_USER: banan
      POSTGRES_PASSWORD: banan
      POSTGRES_DB: banan
    ports:
      - "5432:5432"
    volumes:
      - banan-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banan"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: banan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  banan-postgres:
